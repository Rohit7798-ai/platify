version: '3.9'

services:
  # ─── Backend API Server ────────────────────
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: plantify-server
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=8000
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (Nginx serving built assets) ──
  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    container_name: plantify-client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

  # ─── Redis Cache ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: plantify-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
